# Конфигурация агента-сборщика техжурнала 1С (tj-agent-go), режим follow.
#
# Запуск:  tj-agent-go --config tj-agent.yaml
# Служба:  tj-agent-go service install --config C:\tj-agent\tj-agent.yaml
# Явные CLI-флаги (--threads, --metrics, ...) перекрывают значения файла.
# Незнакомый ключ — ошибка запуска (защита от опечаток).

# Отслеживаемые каталоги ТЖ (рекурсивно, *.log ≥ 100 байт). Обязателен ≥ 1.
# Штатная структура: <каталог>\<процесс>_<pid>\YYMMDDHH.log; первый сегмент
# относительного пути файла становится колонкой collection и лейблом метрик.
inputs:
  - 'C:\1C_TJ\logs'
  # - 'D:\1C_TJ\logs_srv2'

# DSN ClickHouse (обязателен). Продуктовый онлайн-режим — рich-схема tj.events:
# схема выбирается query-параметром schema=rich, таблица — table=<имя>.
# Формат: clickhouse://[user:pass@]host:port/db[?schema=rich&table=events&compress=lz4]
sink: 'clickhouse://localhost:9001/tj?schema=rich&table=events'

# Каталог состояния (обязателен): checkpoints.json — оффсеты, подтверждённые
# ClickHouse; переживает рестарты (ноль потерь, at-least-once на краше).
state_dir: 'C:\ProgramData\tj-agent\state'

# Stop-файл (опционален): появление файла = graceful-останов. Службу Windows
# останавливает сигнал SCM (service stop), консоль — Ctrl+C; stop-файл —
# третий, скриптовый способ. Пусто — выключен.
stop_file: ''

# Период обхода каталогов inputs, мс (обнаружение НОВЫХ файлов; рост уже
# отслеживаемых ловится точным опросом хэндлов с тем же кадансом). 10..60000.
poll_ms: 500

# Закрытие «висящего» события по тишине, мс: pending-событие, целиком
# оканчивающееся переводом строки, эмитится, если новых данных нет столько мс.
idle_close_ms: 2000

# Политика батчей вставки: N строк ИЛИ N байт ИЛИ N мс — что наступит раньше.
batch_rows: 50000
batch_bytes: 67108864   # 64 МБ
flush_ms: 1000

# Воркеры-хвостовики (файл закреплён за воркером). По умолчанию — число CPU.
threads: 4

# Нормализация SQL rich-схемы (docs/sql-normalization.md): литералы → '?',
# значения — в колонку sql_params, хэш нормы — sql_norm_hash, число
# параметров — param_count. По умолчанию включена. false — выключить:
# колонки не вычисляются и не входят в INSERT (совместимость с tj.events
# без миграции deploy/clickhouse/init/002_sql_norm.sql).
sql_norm: true

# Умная значимая строка контекста для СКД (docs/context-line.md).
# context_line — «значимый отпечаток» стека вызовов: обычно последняя
# непустая строка Context. У операций компоновки данных хвост стека —
# универсальная обвязка (ОбщийМодуль.КомпоновкаДанных.Модуль : NNN :
# ПроцессорВывода.Вывести(...)), по которой не видно, КАКОЙ отчёт виноват.
# При включённой опции, если последняя строка — вызов Вывести( /
# ВывестиЭлемент( / НачатьВывод( / Инициализировать( компоновки (англ.
# Output/OutputItem/BeginOutput/Initialize), context_line берётся из самой
# глубокой строки стека с модулем Отчет.* / ВнешнийОтчет.* / Обработка.* /
# ВнешняяОбработка.* (англ. Report./ExternalReport./DataProcessor./
# ExternalDataProcessor.); нет такой — последняя строка, как обычно.
# context и context_hash НЕ меняются (группировки непрерывны).
# По умолчанию включена. CLI-переопределение: --context-skd-smart true|false.
context_skd_smart: true

# Дисковый буфер конвейера (WAL, референс-дизайн Vector — docs/adr-vector.md §1).
#
# type: memory (по умолчанию) — сегодняшнее поведение БЕЗ буфера: чекпоинт
#   ТЖ-файла двигается только после подтверждения вставки ClickHouse; при
#   простое БД чтение встаёт на backpressure (память не растёт, но и
#   чекпоинты стоят).
# type: disk — журнал упреждающей записи между разбором и вставкой:
#   - событие → NDJSON-кадр (длина + CRC-32C) → сегмент seg-NNN.wal;
#   - групповой fsync раз в fsync_ms; чекпоинт ТЖ двигается сразу после
#     fsync (а не после ClickHouse) — агент переживает долгий простой БД
#     без роста памяти и не отстаёт от читаемых журналов;
#   - доставка в ClickHouse — отдельным читателем буфера; его курсор
#     двигается по ack вставки, подтверждённые сегменты удаляются;
#   - гарантии: ТЖ→буфер ноль потерь, буфер→ClickHouse at-least-once
#     (после краша возможны дубли в пределах одного батча + fsync-окна);
#   - буфер полон (max_bytes) → чтение ТЖ блокируется (when_full=block,
#     ТЖ-файлы — внешний WAL), падения/потерь нет;
#   - ошибка I/O буфера = немедленная жёсткая остановка агента (exit 3) —
#     принцип «не терять молча»; счётчик tj_buffer_write_errors_total
#     обязан оставаться 0.
# path: каталог сегментов; пусто → <state_dir>\buffer (там же cursor.json).
# max_bytes: жёсткий предел суммарного размера буфера, байт.
#   Минимум 268435456 (256 МиБ), по умолчанию 1073741824 (1 ГиБ).
#   Правило сайзинга (Vector): оценивайте размер события по его
#   JSON-представлению без сжатия; 1 ГиБ ≈ 30-60 минут простоя БД при
#   ~5000 соб/с среднего продакшн-потока.
# fsync_ms: период группового fsync, мс (1..60000, по умолчанию 500).
#   Меньше — короче окно дублей после краха ОС, больше — меньше I/O.
# CLI-переопределения: --buffer, --buffer-path, --buffer-max-bytes,
# --buffer-fsync-ms.
buffer:
  type: memory
  path: ''
  max_bytes: 1073741824
  fsync_ms: 500

# Адрес endpoint'а /metrics (формат Prometheus); пусто — выключен.
# Для скрейпа из Docker-контейнера Prometheus слушайте на 0.0.0.0
# (host.docker.internal:9101 из контейнера → хост).
metrics: '127.0.0.1:9101'

# Подробность журнала: error — только ошибки; info — + старт/стоп, прогресс
# раз в 2 с, резюме/усечения; debug — + регистрация файлов, idle-закрытия.
log_level: info

# Файл журнала (append); пусто — stderr. Служба Windows при пустом значении
# пишет в <state_dir>\tj-agent-go.log (stderr службы уходит в никуда).
log_file: ''

# Итоговая статистика прогона в JSON (контракт bake-off §3); пусто — не писать.
stats_json: ''
